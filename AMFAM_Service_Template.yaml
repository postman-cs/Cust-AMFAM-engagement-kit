  - name: Get Policy by ID
    request:
      method: GET
      header:
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      - key: X-Operating-Company
        value: '{{operating_company}}'
      url:
        raw: '{{base_url}}/{{api_version}}/policies/:policy_id'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - policies
        - :policy_id
        variable:
        - key: policy_id
          value: POL-2026-001234
    response:
    - name: Policy Detail
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      - key: X-Api-Version
        value: 1.4.2
      - key: X-Correlation-Id
        value: a1b2c3d4-e5f6-7890-abcd-ef1234567890
