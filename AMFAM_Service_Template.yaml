- name: 5 — Content Delivery (Sitecore Edge)
  description: AMFAM migrated from monolithic Sitecore XP to composable Sitecore XM Cloud, delivered via `edge.sitecorecloud.io`.
    This models the headless CMS content API that feeds their Next.js frontend on Vercel.
  item:
  - name: Get Page Layout (Sitecore Layout Service)
    request:
      auth:
        type: apikey
        apikey:
        - key: key
          value: sc_apikey
          type: string
        - key: value
          value: '{{sitecore_api_key}}'
          type: string
        - key: in
          value: header
          type: string
      method: GET
      header:
      - key: Accept
        value: application/json
      url:
        raw: https://edge.sitecorecloud.io/api/graphql/v1?sc_site=amfampublic
        protocol: https
        host:
        - edge
        - sitecorecloud
        - io
        path:
        - api
        - graphql
        - v1
        query:
        - key: sc_site
          value: amfampublic
          description: Matches X-Matched-Path from www.amfam.com headers
      description: |-
        Sitecore Experience Edge GraphQL endpoint. The `sc_site=amfampublic` value was discovered in the `X-Matched-Path` response header from www.amfam.com (`/en/_sites/amfampublic`).

        This is how their Next.js frontend on Vercel fetches structured content from the Azure-hosted CMS.
    response: []
  - name: Get Site Navigation (GraphQL)
    request:
      auth:
        type: apikey
        apikey:
        - key: key
          value: sc_apikey
          type: string
        - key: value
          value: '{{sitecore_api_key}}'
          type: string
        - key: in
          value: header
          type: string
      method: POST
      header:
      - key: Content-Type
        value: application/json
      - key: Accept
        value: application/json
      body:
        mode: raw
        raw: |-
          {
            "query": "query SiteNavigation($site: String!, $language: String!) { layout(site: $site, routePath: \"/\", language: $language) { item { name, children { results { name, url { path } } } } } }",
            "variables": {
              "site": "amfampublic",
              "language": "en"
            }
          }
      url:
        raw: https://edge.sitecorecloud.io/api/graphql/v1
        protocol: https
        host:
        - edge
        - sitecorecloud
        - io
        path:
        - api
        - graphql
        - v1
      description: GraphQL query against Sitecore Edge. Demonstrates that AMFAM has a **GraphQL** surface (via Sitecore) in
        addition to any REST APIs they maintain internally.
    response: []
- name: 6 — Legacy Bridge (SFTP/Batch)
  description: |-
    Discovery revealed `sftpmft1a.amfam.com` sharing the same IP as `api.amfam.com` (165.200.238.15). This folder models the API wrapper that likely bridges modern microservices with legacy batch/file transfer systems.

    This is a key conversation starter: replacing file-based integration with API-based patterns.
  item:
  - name: Trigger Batch Sync (Policy Extract)
    request:
      method: POST
      header:
      - key: Content-Type
        value: application/json
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      body:
        mode: raw
        raw: |-
          {
            "job_type": "policy_extract",
            "operating_company": "{{operating_company}}",
            "date_range": {
              "from": "2026-03-23",
              "to": "2026-03-24"
            },
            "format": "json",
            "destination": "s3://amfam-data-lake-prd/policy-extracts/"
          }
      url:
        raw: '{{base_url}}/{{api_version}}/batch/jobs'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - batch
        - jobs
      description: |-
        Triggers a batch extract from the legacy mainframe via the SFTP bridge. This represents the transitional pattern: a REST API that kicks off what was previously a manual SFTP file drop.

        This is the modernization path: SFTP → API-triggered batch → real-time event stream.
    response:
    - name: Job Queued
      status: Accepted
      code: 202
      header:
      - key: Content-Type
        value: application/json
      - key: Location
        value: /v1/batch/jobs/JOB-20260324-001
      - key: X-Api-Version
        value: 1.4.2
      body: |-
        {
          "job_id": "JOB-20260324-001",
          "status": "queued",
          "estimated_completion": "2026-03-24T05:00:00Z",
          "_links": {
            "self": "/v1/batch/jobs/JOB-20260324-001",
            "cancel": "/v1/batch/jobs/JOB-20260324-001/cancel"
          }
        }
  - name: Get Batch Job Status
    request:
      method: GET
      header:
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      url:
        raw: '{{base_url}}/{{api_version}}/batch/jobs/:job_id'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - batch
        - jobs
        - :job_id
        variable:
        - key: job_id
          value: JOB-20260324-001
    response:
    - name: Job Complete
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: |-
        {
          "job_id": "JOB-20260324-001",
          "status": "completed",
          "started_at": "2026-03-24T04:35:00Z",
          "completed_at": "2026-03-24T04:52:00Z",
          "records_processed": 12847,
          "output": {
            "location": "s3://amfam-data-lake-prd/policy-extracts/2026-03-24/",
            "file_count": 3,
            "total_size_mb": 45.2
          },
          "_meta": {
            "source": "mainframe-policy-db",
            "bridge": "sftpmft1a.amfam.com",
            "method": "sftp-pull-transform-load"
          }
        }
- name: 7 — Governance Probes
  description: 'Requests designed to test API governance posture: error handling, rate limiting, CORS, versioning. Use these
    during the engagement to demonstrate what good looks like.'
  item:
  - name: Malformed Request (Error Shape Test)
    request:
      method: POST
      header:
      - key: Content-Type
        value: application/json
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      body:
        mode: raw
        raw: |-
          {
            "this_field_does_not_exist": true,
            "policy_id": 12345
          }
      url:
        raw: '{{base_url}}/{{api_version}}/quotes'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - quotes
      description: Intentionally malformed request to test error response standardization. RFC 9457 (Problem Details) compliance
        is the gold standard.
    response:
    - name: Well-Structured Error (RFC 9457)
      status: Unprocessable Entity
      code: 422
      header:
      - key: Content-Type
        value: application/problem+json
      - key: X-Api-Version
        value: 1.4.2
      - key: X-Correlation-Id
        value: c3d4e5f6-a7b8-9012-cdef-123456789012
      body: |-
        {
          "type": "https://api.amfam.com/errors/validation-error",
          "title": "Validation Error",
          "status": 422,
          "detail": "Request body failed schema validation",
          "instance": "/v1/quotes",
          "errors": [
            {
              "field": "type",
              "message": "Required field 'type' is missing",
              "code": "REQUIRED_FIELD"
            },
            {
              "field": "applicant",
              "message": "Required field 'applicant' is missing",
              "code": "REQUIRED_FIELD"
            },
            {
              "field": "this_field_does_not_exist",
              "message": "Unknown field not permitted",
              "code": "ADDITIONAL_PROPERTY"
            },
            {
              "field": "policy_id",
              "message": "Expected type 'string', got 'integer'",
              "code": "TYPE_MISMATCH"
            }
          ]
        }
    - name: Generic Error (Common Anti-Pattern)
      status: Internal Server Error
      code: 500
      header:
      - key: Content-Type
        value: application/json
      body: |-
        {
          "message": "Internal Server Error"
        }
  - name: Expired Token (401 Shape Test)
    request:
      auth:
        type: bearer
        bearer:
        - key: token
          value: expired.jwt.token
          type: string
      method: GET
      header:
      - key: Accept
        value: application/json
      url:
        raw: '{{base_url}}/{{api_version}}/policies'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - policies
      description: Tests 401 response shape with an expired token. Good APIs return a `WWW-Authenticate` header with error
        details per RFC 6750.
    response:
    - name: Proper 401 with WWW-Authenticate
      status: Unauthorized
      code: 401
      header:
      - key: Content-Type
        value: application/problem+json
      - key: WWW-Authenticate
        value: Bearer realm="amfam-api", error="invalid_token", error_description="The access token has expired"
      body: |-
        {
          "type": "https://api.amfam.com/errors/unauthorized",
          "title": "Unauthorized",
          "status": 401,
          "detail": "The access token has expired. Request a new token from the Okta authorization server."
        }
  - name: Rate Limit Test (Rapid Fire)
    event:
    - listen: test
      script:
        type: text/javascript
        exec:
        - pm.test('Rate limit headers are present', function () {
        - '    pm.expect(pm.response.headers.has(''X-RateLimit-Limit'')).to.be.true;'
        - '    pm.expect(pm.response.headers.has(''X-RateLimit-Remaining'')).to.be.true;'
        - '    pm.expect(pm.response.headers.has(''X-RateLimit-Reset'')).to.be.true;'
        - '});'
        - ''
        - if (pm.response.code === 429) {
        - '    pm.test(''429 includes Retry-After header'', function () {'
        - '        pm.expect(pm.response.headers.has(''Retry-After'')).to.be.true;'
        - '    });'
        - '}'
    request:
      method: GET
      header:
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      url:
        raw: '{{base_url}}/{{api_version}}/policies?page=1&per_page=1'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - policies
        query:
        - key: page
          value: '1'
        - key: per_page
          value: '1'
      description: Run via Collection Runner with 50+ iterations to test rate limiting behavior. Checks for `X-RateLimit-*`
        headers and proper `429 Too Many Requests` with `Retry-After`.
    response:
    - name: Rate Limited
      status: Too Many Requests
      code: 429
      header:
      - key: Content-Type
        value: application/problem+json
      - key: X-RateLimit-Limit
        value: '1000'
      - key: X-RateLimit-Remaining
        value: '0'
      - key: X-RateLimit-Reset
        value: '1774330000'
      - key: Retry-After
        value: '30'
      body: |-
        {
          "type": "https://api.amfam.com/errors/rate-limited",
          "title": "Too Many Requests",
          "status": 429,
          "detail": "Rate limit exceeded. 1000 requests per 15 minutes allowed."
        }
  - name: CORS Preflight Check
    request:
      auth:
        type: noauth
      method: OPTIONS
      header:
      - key: Origin
        value: https://www.amfam.com
      - key: Access-Control-Request-Method
        value: GET
      - key: Access-Control-Request-Headers
        value: Authorization, X-Correlation-Id, X-Operating-Company
      url:
        raw: '{{base_url}}/{{api_version}}/policies'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - policies
      description: Tests CORS preflight response. Since AMFAM's frontend is on Vercel (different origin than API), proper
        CORS configuration is critical.
    response: []
