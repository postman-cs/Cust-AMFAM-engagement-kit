- name: 3 — Claims Service
  description: Claims processing. CSP headers on myaccount.amfam.com reveal integration with glassclaim.com for glass claims.
    This models the internal claims API.
  item:
  - name: File a Claim (FNOL)
    request:
      method: POST
      header:
      - key: Content-Type
