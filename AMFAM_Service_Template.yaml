info:
  _postman_id: amfam-service-template-2026
  name: AMFAM — Insurance Platform Service Template
  description: |-
    # AMFAM Insurance Platform — Sample Service Template

    A representative API service template modeled on American Family Insurance's discovered infrastructure:

    | Signal | Reflected In Template |
    |--------|----------------------|
    | AWS (primary cloud) | Base URLs, health checks, CloudFront headers |
    | Okta (IAM) | OAuth 2.0 Client Credentials + Bearer token auth |
    | Kubernetes | Readiness/liveness probes, service mesh headers |
    | Dynatrace | `x-dynatrace` trace correlation headers |
    | Microservices (Homesite pattern) | Domain-driven service boundaries |
    | Multi-subsidiary | Environment variables per operating company |
    | Legacy on-prem coexistence | SFTP/batch endpoints alongside REST |

    ## How to Use This Template

    1. **Import** into a Postman workspace
    2. **Set the environment** to one of the operating company configs
    3. **Walk through the folders** during the engagement to spark conversation about governance, auth standardization, and API catalog needs

    ---

    *Generated from AMFAM Discovery Brief — March 2026*
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json

# ---------------------------------------------------------------------------
# Environments — switch between subsidiaries during the engagement
# ---------------------------------------------------------------------------
environments:

  amfam_core:
    name: "AMFAM — Core (American Family Mutual)"
    description: >-
      Parent company. On-prem API (api.amfam.com, firewalled).
      Sitecore XM Cloud CMS on Azure. Website on Vercel.
    values:
      subsidiary_domain: amfam.com
      operating_company: american_family_mutual
      base_url: https://api.amfam.com
      api_version: v1
      okta_domain: amfam.okta.com
      okta_scope: "api:read api:write"
      dynatrace_tag: "NA;amfam-core;policy-service"
      sitecore_api_key: "<SITECORE_EDGE_API_KEY>"
    secrets:
      client_id: "<YOUR_OKTA_CLIENT_ID>"
      client_secret: "<YOUR_OKTA_CLIENT_SECRET>"
    runtime:
      access_token: ""
      token_expiry: ""

  homesite:
    name: "AMFAM — Homesite (AWS Microservices)"
    description: >-
      Subsidiary that migrated monolith → microservices on AWS.
      515% reduction in quote-to-bind time. DNS on Route53.
      Legacy IIS/ASP.NET still present at www.homesite.com.
    values:
      subsidiary_domain: homesite.com
      operating_company: homesite
      base_url: https://api.homesite.com
      api_version: v1
      okta_domain: amfam.okta.com
      okta_scope: "api:read api:write quotes:create"
      dynatrace_tag: "NA;homesite;policy-service"
      sitecore_api_key: ""
    secrets:
      client_id: "<YOUR_OKTA_CLIENT_ID>"
      client_secret: "<YOUR_OKTA_CLIENT_SECRET>"
    runtime:
      access_token: ""
      token_expiry: ""

  connect:
    name: "AMFAM — CONNECT (Brokerage Platform)"
    description: >-
      Brokerage platform at connectbyamfam.com. On-prem root
      (165.200.238.68) redirects to Vercel. policyservice subdomain
      routes through AWS but currently returning 500s.
    values:
      subsidiary_domain: connectbyamfam.com
      operating_company: connect_by_amfam
      base_url: https://api.connectbyamfam.com
      api_version: v1
      okta_domain: amfam.okta.com
      okta_scope: "api:read policyservice:read"
      dynatrace_tag: "NA;connect;policy-service"
      sitecore_api_key: ""
    secrets:
      client_id: "<YOUR_OKTA_CLIENT_ID>"
      client_secret: "<YOUR_OKTA_CLIENT_SECRET>"
    runtime:
      access_token: ""
      token_expiry: ""

# ---------------------------------------------------------------------------
# Collection
# ---------------------------------------------------------------------------
auth:
  type: bearer
  bearer:
  - key: token
    value: '{{access_token}}'
    type: string
event:
- listen: prerequest
  script:
    type: text/javascript
    exec:
    - // Auto-fetch Okta token if expired or missing
    - const tokenExpiry = pm.environment.get('token_expiry');
    - const now = Math.floor(Date.now() / 1000);
    - ''
    - if (!pm.environment.get('access_token') || (tokenExpiry && now >= parseInt(tokenExpiry))) {
    - '    const oktaDomain = pm.environment.get(''okta_domain'');'
    - '    const clientId = pm.environment.get(''client_id'');'
    - '    const clientSecret = pm.environment.get(''client_secret'');'
    - '    const scope = pm.environment.get(''okta_scope'') || ''api:read api:write'';'
    - ''
    - '    pm.sendRequest({'
    - '        url: `https://${oktaDomain}/oauth2/default/v1/token`,'
    - '        method: ''POST'','
    - '        header: {'
    - '            ''Content-Type'': ''application/x-www-form-urlencoded'','
    - '            ''Accept'': ''application/json'''
    - '        },'
    - '        body: {'
    - '            mode: ''urlencoded'','
    - '            urlencoded: ['
    - '                { key: ''grant_type'', value: ''client_credentials'' },'
    - '                { key: ''client_id'', value: clientId },'
    - '                { key: ''client_secret'', value: clientSecret },'
    - '                { key: ''scope'', value: scope }'
    - '            ]'
    - '        }'
    - '    }, (err, res) => {'
    - '        if (!err && res.code === 200) {'
    - '            const body = res.json();'
    - '            pm.environment.set(''access_token'', body.access_token);'
    - '            pm.environment.set(''token_expiry'', String(now + body.expires_in - 30));'
    - '            console.log(''Okta token refreshed successfully'');'
    - '        } else {'
    - '            console.error(''Token fetch failed:'', err || res.text());'
    - '        }'
    - '    });'
    - '}'
- listen: test
  script:
    type: text/javascript
    exec:
    - '// Governance: validate standard response headers on every call'
    - pm.test('Response includes correlation ID', function () {
    - '    pm.expect(pm.response.headers.has(''x-correlation-id'') || pm.response.headers.has(''x-request-id'')).to.be.true;'
    - '});'
    - ''
    - pm.test('Response includes API version header', function () {
    - '    pm.expect(pm.response.headers.has(''x-api-version'')).to.be.true;'
    - '});'
    - ''
    - pm.test('Strict-Transport-Security is present', function () {
    - '    pm.expect(pm.response.headers.has(''strict-transport-security'')).to.be.true;'
    - '});'
    - ''
    - pm.test('Response time is within SLA (< 2000ms)', function () {
    - '    pm.expect(pm.response.responseTime).to.be.below(2000);'
    - '});'
variable:
- key: base_url
  value: https://api.{{subsidiary_domain}}
- key: api_version
  value: v1
item:
- name: 0 — Platform Health
  description: Kubernetes-style health probes. AMFAM runs K8s on AWS EKS. These endpoints are the baseline contract every
    service must implement.
  item:
  - name: Liveness Probe
    request:
      method: GET
      header: []
      url:
        raw: '{{base_url}}/health/live'
        host:
        - '{{base_url}}'
        path:
        - health
        - live
      description: Kubernetes liveness check. Returns 200 if the process is running. No auth required — exposed to the K8s
        kubelet only.
    response:
    - name: Healthy
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      - key: X-Api-Version
        value: 1.4.2
      - key: X-Request-Id
        value: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      body: |-
        {
          "status": "UP",
          "timestamp": "2026-03-24T04:30:00Z"
        }
  - name: Readiness Probe
    request:
      method: GET
      header: []
      url:
        raw: '{{base_url}}/health/ready'
        host:
        - '{{base_url}}'
        path:
        - health
        - ready
      description: Kubernetes readiness check. Returns 200 only when all dependencies (Okta, CouchDB, downstream services)
        are reachable.
    response:
    - name: Ready
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      - key: X-Api-Version
        value: 1.4.2
      body: |-
        {
          "status": "UP",
          "checks": {
            "okta": { "status": "UP", "latency_ms": 12 },
            "couchdb": { "status": "UP", "latency_ms": 3 },
            "policy-service": { "status": "UP", "latency_ms": 45 },
            "sftp-bridge": { "status": "UP", "latency_ms": 120 }
          },
          "timestamp": "2026-03-24T04:30:00Z"
        }
    - name: Degraded — Legacy Bridge Down
      status: Service Unavailable
      code: 503
      header:
      - key: Content-Type
        value: application/json
      body: |-
        {
          "status": "DEGRADED",
          "checks": {
            "okta": { "status": "UP", "latency_ms": 14 },
            "couchdb": { "status": "UP", "latency_ms": 4 },
            "policy-service": { "status": "UP", "latency_ms": 52 },
            "sftp-bridge": { "status": "DOWN", "error": "Connection refused to 165.200.238.15:22" }
          },
          "timestamp": "2026-03-24T04:30:00Z"
        }
  - name: Dynatrace Synthetic Check
    request:
      method: GET
      header:
      - key: x-dynatrace
        value: FW4;{{dynatrace_tag}}
        description: Dynatrace distributed trace tag for synthetic monitoring
      url:
        raw: '{{base_url}}/health/deep'
        host:
        - '{{base_url}}'
        path:
        - health
        - deep
      description: Deep health check with Dynatrace trace correlation. Validates full request path through API gateway → service
        → database → legacy bridge.
    response:
    - name: Deep Health OK
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      - key: x-dynatrace
        value: FW4;2a4b6c8d;path=api.amfam.com
      - key: server-timing
        value: dtRpid;desc="-1234567890", dtSInfo;desc="0"
      body: |-
        {
          "status": "UP",
          "trace_id": "abc123def456",
          "path": [
            { "hop": "cloudfront", "latency_ms": 2 },
            { "hop": "nginx-ingress", "latency_ms": 1 },
            { "hop": "policy-service", "latency_ms": 34 },
            { "hop": "couchdb", "latency_ms": 5 },
            { "hop": "sftp-bridge", "latency_ms": 145 }
          ],
          "total_latency_ms": 187,
          "timestamp": "2026-03-24T04:30:00Z"
        }
- name: 1 — Auth (Okta OAuth 2.0)
  description: AMFAM uses Okta for workforce and service identity. This folder demonstrates the Client Credentials grant for
    service-to-service auth — the pattern their microservices would use internally.
  item:
  - name: Get Access Token (Client Credentials)
    event:
    - listen: test
      script:
        type: text/javascript
        exec:
        - if (pm.response.code === 200) {
        - '    const body = pm.response.json();'
        - '    pm.environment.set(''access_token'', body.access_token);'
        - '    const expiry = Math.floor(Date.now() / 1000) + body.expires_in - 30;'
        - '    pm.environment.set(''token_expiry'', String(expiry));'
        - ''
        - '    pm.test(''Token type is Bearer'', function () {'
        - '        pm.expect(body.token_type).to.eql(''Bearer'');'
        - '    });'
        - ''
        - '    pm.test(''Token has expected scopes'', function () {'
        - '        pm.expect(body.scope).to.include(''api:read'');'
        - '    });'
        - ''
        - '    // Decode JWT to inspect claims without external tools'
        - '    const payload = JSON.parse(atob(body.access_token.split(''.'')[1]));'
        - '    console.log(''Token issuer:'', payload.iss);'
        - '    console.log(''Token audience:'', payload.aud);'
        - '    console.log(''Token scopes:'', payload.scp);'
        - ''
        - '    pm.test(''Issuer matches Okta domain'', function () {'
        - '        pm.expect(payload.iss).to.include(pm.environment.get(''okta_domain''));'
        - '    });'
        - '}'
    request:
      auth:
        type: noauth
      method: POST
      header:
      - key: Content-Type
        value: application/x-www-form-urlencoded
      - key: Accept
        value: application/json
      body:
        mode: urlencoded
        urlencoded:
        - key: grant_type
          value: client_credentials
        - key: client_id
          value: '{{client_id}}'
        - key: client_secret
          value: '{{client_secret}}'
        - key: scope
          value: '{{okta_scope}}'
      url:
        raw: https://{{okta_domain}}/oauth2/default/v1/token
        protocol: https
        host:
        - '{{okta_domain}}'
        path:
        - oauth2
        - default
        - v1
        - token
      description: |-
        Fetches an OAuth 2.0 access token via Okta's Client Credentials grant.

        This is the service-to-service pattern. The pre-request script at the collection level auto-refreshes this token, so individual requests don't need to call this manually.
    response:
    - name: Token Issued
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: |-
        {
          "token_type": "Bearer",
          "expires_in": 3600,
          "access_token": "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJodHRwczovL2FtZmFtLm9rdGEuY29tL29hdXRoMi9kZWZhdWx0Iiwic3ViIjoiMGNsaWVudC1wb2xpY3ktc2VydmljZSIsImF1ZCI6ImFwaS5hbWZhbS5jb20iLCJzY3AiOlsiYXBpOnJlYWQiLCJhcGk6d3JpdGUiXSwiZXhwIjoxNzc0MzMwMDAwLCJpYXQiOjE3NzQzMjY0MDB9.placeholder-signature",
          "scope": "api:read api:write"
        }
  - name: Introspect Token
    request:
      auth:
        type: noauth
      method: POST
      header:
      - key: Content-Type
        value: application/x-www-form-urlencoded
      - key: Accept
        value: application/json
      body:
        mode: urlencoded
        urlencoded:
        - key: token
          value: '{{access_token}}'
        - key: token_type_hint
          value: access_token
        - key: client_id
          value: '{{client_id}}'
        - key: client_secret
          value: '{{client_secret}}'
      url:
        raw: https://{{okta_domain}}/oauth2/default/v1/introspect
        protocol: https
        host:
        - '{{okta_domain}}'
        path:
        - oauth2
        - default
        - v1
        - introspect
      description: Validates a token's active status and claims. Useful for demonstrating token lifecycle governance.
    response: []
- name: 2 — Policy Service
  description: Core insurance domain. Policies are the heart of AMFAM's business across all 14 operating companies. This models
    a RESTful policy API that would sit behind their AWS infrastructure.
  item:
  - name: List Policies
    event:
    - listen: test
      script:
        type: text/javascript
        exec:
        - pm.test('Status is 200', function () {
        - '    pm.response.to.have.status(200);'
        - '});'
        - ''
        - pm.test('Response is paginated', function () {
        - '    const body = pm.response.json();'
        - '    pm.expect(body).to.have.property(''data'');'
        - '    pm.expect(body).to.have.property(''pagination'');'
        - '    pm.expect(body.pagination).to.have.property(''total'');'
        - '    pm.expect(body.pagination).to.have.property(''page'');'
        - '    pm.expect(body.pagination).to.have.property(''per_page'');'
        - '});'
        - ''
        - pm.test('All policies have required fields', function () {
        - '    const policies = pm.response.json().data;'
        - '    policies.forEach(p => {'
        - '        pm.expect(p).to.have.all.keys(''policy_id'', ''type'', ''status'', ''effective_date'', ''operating_company'');'
        - '    });'
        - '});'
    request:
      method: GET
      header:
      - key: Accept
        value: application/json
      - key: X-Correlation-Id
        value: '{{$guid}}'
      - key: X-Operating-Company
        value: '{{operating_company}}'
        description: Routes to correct subsidiary backend
      url:
        raw: '{{base_url}}/{{api_version}}/policies?page=1&per_page=25&status=active'
        host:
        - '{{base_url}}'
        path:
        - '{{api_version}}'
        - policies
        query:
        - key: page
          value: '1'
        - key: per_page
          value: '25'
        - key: status
          value: active
    response:
    - name: Paginated Policy List
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      - key: X-Api-Version
        value: 1.4.2
      - key: X-Correlation-Id
        value: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      - key: X-RateLimit-Limit
        value: '1000'
      - key: X-RateLimit-Remaining
        value: '998'
      - key: X-RateLimit-Reset
